name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONNOUSERSITE: "1"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-lock.txt
            requirements-dev-lock.txt

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: python -m pip install --require-hashes -r requirements-dev-lock.txt

      - name: Verify installed dependencies
        run: python -m pip check

      - name: Ruff
        run: python -m ruff check app tests tools

      - name: Mypy (incremental scope)
        run: python -m mypy

      - name: JavaScript syntax
        run: npm run check:js

      - name: Generated documentation drift
        run: |
          python tools/api_inventory.py --check
          python tools/architecture_inventory.py --check

      - name: Tests and coverage
        run: python -m pytest -q -p no:cacheprovider --cov=app --cov=tools --cov-report=term-missing --cov-report=xml

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install browser test dependencies
        run: npm ci

      - name: Install Chromium
        run: npx --no-install playwright install --with-deps chromium

      - name: Browser regression tests
        run: npm run test:e2e
