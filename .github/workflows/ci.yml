name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: macos-latest
    timeout-minutes: 20
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONNOUSERSITE: "1"
      TZ: UTC

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-lock.txt
            requirements-dev-lock.txt

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: python -m pip install --require-hashes -r requirements-dev-lock.txt

      - name: Verify installed dependencies
        run: python -m pip check

      - name: Ruff
        run: python -m ruff check app tests tools

      - name: Mypy (incremental scope)
        run: python -m mypy

      - name: JavaScript syntax
        run: npm run check:js

      - name: Generated documentation drift
        run: |
          python tools/api_inventory.py --check
          python tools/architecture_inventory.py --check

      - name: Tests and coverage
        run: python -m pytest -q -p no:cacheprovider --cov=app --cov=tools --cov-report=term-missing --cov-report=xml

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install browser test dependencies
        run: npm ci

      - name: Install Chromium
        run: npx --no-install playwright install --with-deps chromium

      - name: Browser regression tests
        run: npm run test:e2e
